# Arrancar con:  docker compose --env-file backend/.env up -d
# --env-file es necesario para que ${DB_PASSWORD} y ${DB_ROOT_PASSWORD}
# se resuelvan al nivel del motor compose (env_file solo inyecta en el contenedor).

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - /srv/web:/srv/web:ro
    depends_on:
      - api
    networks:
      - interna

  api:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST: db
    # Sin ports: solo accesible desde la red interna vía Caddy
    depends_on:
      db:
        condition: service_healthy
    networks:
      - interna

  db:
    image: mysql:8.0
    restart: unless-stopped
    # ponytail: --performance-schema=OFF ahorra ~200MB RAM; buffer pool explícito para 1GB droplet
    command: --innodb-buffer-pool-size=128M --performance-schema=OFF
    env_file: ./backend/.env
    environment:
      MYSQL_DATABASE: ${DB_NAME:-app_turnos}
      MYSQL_USER: ${DB_USER:-appturnos}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER:-appturnos}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - interna

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  interna:
    driver: bridge
