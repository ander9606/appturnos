<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>App Turnos · Prototipo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #F4EFE7;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* Stage scaling for any viewport */
  #root { width: 100%; height: 100vh; display: grid; place-items: center; overflow: hidden;
    background:
      radial-gradient(1200px 800px at 30% 10%, #FFF1E5 0%, transparent 60%),
      radial-gradient(900px 600px at 80% 90%, #FFE9DD 0%, transparent 60%),
      #F4EFE7;
  }

  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.25); opacity: 0.55; }
  }
  @keyframes pop-in {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes slide-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes screen-in {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes screen-in-up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- ═══════════════════════════════════════════════════════
     1. Design tokens + UI primitives
     (NativeWind token mapping: CN = nómina emerald, C = turnos orange)
     ═══════════════════════════════════════════════════════ -->
<script type="text/babel">
// ui-kit.jsx — App Turnos design primitives (warm gig-economy)

const C = {
  primary: '#FF5A3C',
  primaryDark: '#E64829',
  primaryDeep: '#B8341A',
  primaryTint: '#FFEDE6',
  primarySoft: '#FFF6F1',
  bg: '#FFFBF6',
  card: '#FFFFFF',
  text: '#1A1410',
  textDim: '#56463B',
  muted: '#8F8478',
  mutedLight: '#C9BFB4',
  border: '#EFE7DC',
  borderDim: '#F7F0E6',
  success: '#10B981',
  successTint: '#E8FBF3',
  warning: '#F5A623',
  warningTint: '#FFF4DD',
  danger: '#EF4444',
  dangerTint: '#FFE8E6',
  star: '#FFB800',
  ink: '#0B0907',
  night: '#241B14',
};


// ── Track nómina colors (emerald green — distinguishes from turnos orange) ─────
const CN = {
  primary: '#059669',
  primaryDark: '#047857',
  primaryDeep: '#065f46',
  primaryTint: '#d1fae5',
  primarySoft: '#ecfdf5',
};
const fontDisplay = '"Bricolage Grotesque", "Plus Jakarta Sans", system-ui, sans-serif';
const fontBody = '"Plus Jakarta Sans", system-ui, -apple-system, sans-serif';

// ── Currency / format helpers ──────────────────────────────────────
const fmtCOP = (n) => {
  if (n == null) return '';
  return '$' + Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
};
const fmtDist = (m) => {
  if (m < 1000) return Math.round(m) + ' m';
  return (m / 1000).toFixed(m < 10000 ? 1 : 0) + ' km';
};

// ── Card ───────────────────────────────────────────────────────────
function Card({ children, style, onClick, padding = 16, radius = 20, elevated = false }) {
  return (
    <div
      onClick={onClick}
      style={{
        background: C.card,
        borderRadius: radius,
        padding,
        border: elevated ? 'none' : `1px solid ${C.border}`,
        boxShadow: elevated
          ? '0 1px 3px rgba(60,40,30,0.04), 0 8px 24px rgba(60,40,30,0.06)'
          : '0 1px 0 rgba(60,40,30,0.02)',
        cursor: onClick ? 'pointer' : 'default',
        transition: 'transform 0.15s ease, box-shadow 0.15s ease',
        ...style,
      }}
    >
      {children}
    </div>
  );
}

// ── Buttons ────────────────────────────────────────────────────────
function PrimaryButton({ children, onClick, disabled, icon, full = true, tone = 'primary' }) {
  const bg = disabled
    ? '#E8E1D7'
    : tone === 'primary' ? C.primary
    : tone === 'success' ? C.success
    : tone === 'danger' ? C.danger
    : tone === 'dark' ? C.ink
    : C.primary;
  const color = disabled ? '#A89E92' : '#fff';
  return (
    <button
      onClick={disabled ? undefined : onClick}
      style={{
        width: full ? '100%' : 'auto',
        height: 56,
        borderRadius: 18,
        border: 'none',
        background: bg,
        color,
        fontFamily: fontBody,
        fontSize: 17,
        fontWeight: 700,
        letterSpacing: -0.2,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        gap: 8,
        cursor: disabled ? 'not-allowed' : 'pointer',
        boxShadow: disabled ? 'none' : '0 8px 20px rgba(255,90,60,0.25), inset 0 -2px 0 rgba(0,0,0,0.08)',
        transition: 'transform 0.1s ease',
      }}
      onPointerDown={(e) => !disabled && (e.currentTarget.style.transform = 'scale(0.98)')}
      onPointerUp={(e) => (e.currentTarget.style.transform = 'scale(1)')}
      onPointerLeave={(e) => (e.currentTarget.style.transform = 'scale(1)')}
    >
      {icon}
      {children}
    </button>
  );
}

function GhostButton({ children, onClick, full = true }) {
  return (
    <button
      onClick={onClick}
      style={{
        width: full ? '100%' : 'auto',
        height: 52,
        borderRadius: 16,
        border: `1.5px solid ${C.border}`,
        background: 'transparent',
        color: C.text,
        fontFamily: fontBody,
        fontSize: 16,
        fontWeight: 600,
        cursor: 'pointer',
      }}
    >
      {children}
    </button>
  );
}

function TextButton({ children, onClick, color }) {
  return (
    <button
      onClick={onClick}
      style={{
        background: 'transparent',
        border: 'none',
        color: color || C.primary,
        fontFamily: fontBody,
        fontSize: 15,
        fontWeight: 600,
        cursor: 'pointer',
        padding: '8px 4px',
      }}
    >
      {children}
    </button>
  );
}

// ── Input ──────────────────────────────────────────────────────────
function Field({ label, value, onChange, type = 'text', placeholder, autoFocus, hint }) {
  const [focus, setFocus] = React.useState(false);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      <label style={{
        fontFamily: fontBody, fontSize: 13, fontWeight: 600,
        color: C.textDim, letterSpacing: 0.1,
      }}>{label}</label>
      <input
        autoFocus={autoFocus}
        type={type}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
        onFocus={() => setFocus(true)}
        onBlur={() => setFocus(false)}
        style={{
          height: 56,
          borderRadius: 16,
          border: `1.5px solid ${focus ? C.primary : C.border}`,
          background: focus ? '#fff' : '#FBF7F1',
          padding: '0 18px',
          fontFamily: fontBody,
          fontSize: 17,
          fontWeight: 500,
          color: C.text,
          outline: 'none',
          transition: 'all 0.15s',
        }}
      />
      {hint && (
        <span style={{ fontFamily: fontBody, fontSize: 12, color: C.muted, marginLeft: 4 }}>
          {hint}
        </span>
      )}
    </div>
  );
}

// ── Header (back + title + right) ──────────────────────────────────
function ScreenHeader({ title, onBack, right, big = false, subtitle }) {
  return (
    <div style={{ padding: '8px 20px 4px', display: 'flex', flexDirection: 'column', gap: big ? 14 : 4 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 40 }}>
        {onBack ? (
          <button onClick={onBack} style={{
            width: 40, height: 40, borderRadius: 14, border: `1px solid ${C.border}`,
            background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: 'pointer', padding: 0,
          }}>
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M12 4l-6 6 6 6" stroke={C.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        ) : <div style={{ width: 40 }} />}
        {!big && (
          <div style={{
            fontFamily: fontDisplay, fontSize: 17, fontWeight: 700, color: C.text,
          }}>{title}</div>
        )}
        <div style={{ minWidth: 40, display: 'flex', justifyContent: 'flex-end' }}>{right}</div>
      </div>
      {big && (
        <div>
          <div style={{
            fontFamily: fontDisplay, fontSize: 32, fontWeight: 700, color: C.text, lineHeight: 1.1, letterSpacing: -0.8,
          }}>{title}</div>
          {subtitle && <div style={{ fontFamily: fontBody, fontSize: 15, color: C.muted, marginTop: 6 }}>{subtitle}</div>}
        </div>
      )}
    </div>
  );
}

// ── Badge / Chip ───────────────────────────────────────────────────
function Badge({ children, tone = 'neutral', size = 'md', icon }) {
  const tones = {
    neutral: { bg: '#F4EEE6', fg: C.textDim },
    primary: { bg: C.primaryTint, fg: C.primaryDeep },
    success: { bg: C.successTint, fg: '#0A7A52' },
    warning: { bg: C.warningTint, fg: '#A56400' },
    danger: { bg: C.dangerTint, fg: '#B91C1C' },
    dark: { bg: C.ink, fg: '#fff' },
    star: { bg: '#FFF5DC', fg: '#8A6500' },
  };
  const t = tones[tone] || tones.neutral;
  const sz = size === 'sm' ? { fs: 11, py: 3, px: 8, r: 8 } : { fs: 12, py: 5, px: 10, r: 10 };
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      background: t.bg, color: t.fg,
      padding: `${sz.py}px ${sz.px}px`,
      borderRadius: sz.r,
      fontFamily: fontBody, fontSize: sz.fs, fontWeight: 700, letterSpacing: 0.2,
      whiteSpace: 'nowrap',
    }}>
      {icon}
      {children}
    </span>
  );
}

function Chip({ children, active, onClick, icon }) {
  return (
    <button onClick={onClick} style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      height: 38, padding: '0 16px', borderRadius: 999,
      background: active ? C.ink : '#fff',
      color: active ? '#fff' : C.text,
      border: `1.5px solid ${active ? C.ink : C.border}`,
      fontFamily: fontBody, fontSize: 14, fontWeight: 600,
      whiteSpace: 'nowrap', cursor: 'pointer', flexShrink: 0,
    }}>
      {icon}
      {children}
    </button>
  );
}

// ── Stars ──────────────────────────────────────────────────────────
function Stars({ value = 0, size = 14, full = true }) {
  const v = Math.max(0, Math.min(5, value));
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 1 }}>
      {[1, 2, 3, 4, 5].map((i) => {
        const fill = v >= i ? 1 : v >= i - 0.5 ? 0.5 : 0;
        return (
          <svg key={i} width={size} height={size} viewBox="0 0 16 16" style={{ flexShrink: 0 }}>
            <defs>
              <linearGradient id={`g${i}-${size}`}>
                <stop offset={`${fill * 100}%`} stopColor={C.star} />
                <stop offset={`${fill * 100}%`} stopColor="#E8DFD3" />
              </linearGradient>
            </defs>
            <path d="M8 1.2l2.06 4.18 4.61.67-3.34 3.26.79 4.6L8 11.7l-4.12 2.17.79-4.6L1.33 6.05l4.61-.67L8 1.2z"
              fill={`url(#g${i}-${size})`} />
          </svg>
        );
      })}
      {full && <span style={{ fontFamily: fontBody, fontSize: size - 1, fontWeight: 700, color: C.text, marginLeft: 4 }}>
        {v.toFixed(1)}
      </span>}
    </span>
  );
}

// ── TabBar ─────────────────────────────────────────────────────────
function TabBar({ current, onChange }) {
  const tabs = [
    { id: 'home', label: 'Inicio', icon: 'home' },
    { id: 'ofertas', label: 'Ofertas', icon: 'search' },
    { id: 'hoy', label: 'Hoy', icon: 'pin' },
    { id: 'nomina', label: 'Nómina', icon: 'clock' },
  ];
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 30,
      background: 'rgba(255,251,246,0.95)',
      backdropFilter: 'blur(20px)',
      WebkitBackdropFilter: 'blur(20px)',
      borderTop: `2px solid ${current === 'nomina' ? CN.primary : C.borderDim}`,
      paddingBottom: 28,
      paddingTop: 8,
      display: 'flex',
      justifyContent: 'space-around',
    }}>
      {tabs.map((t) => {
        const active = current === t.id;
        return (
          <button key={t.id} onClick={() => onChange(t.id)} style={{
            flex: 1, background: 'none', border: 'none', cursor: 'pointer',
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
            padding: '4px 0',
          }}>
            <TabIcon name={t.icon} active={active} activeColor={current === 'nomina' ? CN.primary : C.primary} />
            <span style={{
              fontFamily: fontBody, fontSize: 11, fontWeight: 700,
              color: active ? (current === 'nomina' ? CN.primary : C.primary) : C.muted,
              letterSpacing: 0.2,
            }}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function TabIcon({ name, active, activeColor }) {
  const c = active ? (activeColor || C.primary) : C.mutedLight;
  const s = active ? 2.4 : 2;
  switch (name) {
    case 'home':
      return (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1v-9.5z"
            stroke={c} strokeWidth={s} strokeLinejoin="round"
            fill={active ? `${C.primary}22` : 'none'} />
        </svg>
      );
    case 'search':
      return (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="6.5" stroke={c} strokeWidth={s} fill={active ? `${C.primary}22` : 'none'} />
          <path d="M16 16l4 4" stroke={c} strokeWidth={s} strokeLinecap="round" />
        </svg>
      );
    case 'pin':
      return (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 21s-7-7-7-12a7 7 0 0114 0c0 5-7 12-7 12z"
            stroke={c} strokeWidth={s} strokeLinejoin="round"
            fill={active ? `${C.primary}22` : 'none'} />
          <circle cx="12" cy="9" r="2.5" fill={c} />
        </svg>
      );
    case 'clock':
      return (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="8.5" stroke={c} strokeWidth={s} fill={active ? `${C.primary}22` : 'none'} />
          <path d="M12 7v5l3.5 2" stroke={c} strokeWidth={s} strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      );
  }
}

// ── Avatar ─────────────────────────────────────────────────────────
function Avatar({ initials = 'AS', size = 44, tone = 'primary' }) {
  const palettes = {
    primary: { bg: C.primaryTint, fg: C.primaryDeep },
    blue: { bg: '#E0EBFF', fg: '#1E40AF' },
    green: { bg: C.successTint, fg: '#0A7A52' },
    purple: { bg: '#EFE5FF', fg: '#5B21B6' },
    yellow: { bg: '#FFF5DC', fg: '#8A6500' },
  };
  const p = palettes[tone] || palettes.primary;
  return (
    <div style={{
      width: size, height: size, borderRadius: size / 2,
      background: p.bg, color: p.fg,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: fontDisplay, fontWeight: 700, fontSize: size * 0.38,
      letterSpacing: 0.2, flexShrink: 0,
    }}>{initials}</div>
  );
}

// ── Section title ──────────────────────────────────────────────────
function SectionTitle({ children, action, onAction }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
      padding: '0 4px',
    }}>
      <div style={{
        fontFamily: fontDisplay, fontSize: 19, fontWeight: 700,
        color: C.text, letterSpacing: -0.3,
      }}>{children}</div>
      {action && (
        <button onClick={onAction} style={{
          background: 'none', border: 'none', color: C.primary,
          fontFamily: fontBody, fontSize: 14, fontWeight: 700, cursor: 'pointer',
        }}>{action}</button>
      )}
    </div>
  );
}

// ── Mini icons (used in screens) ───────────────────────────────────
function Icon({ name, size = 18, color = C.muted, strokeWidth = 2 }) {
  const p = { stroke: color, strokeWidth, fill: 'none', strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (name) {
    case 'clock':
      return <svg width={size} height={size} viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" {...p} /><path d="M12 7v5l3 2" {...p} /></svg>;
    case 'pin':
      return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M12 21s-7-7-7-12a7 7 0 0114 0c0 5-7 12-7 12z" {...p} /><circle cx="12" cy="9" r="2.5" stroke={color} strokeWidth={strokeWidth} fill="none" /></svg>;
    case 'cash':
      return <svg width={size} height={size} viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2" {...p} /><circle cx="12" cy="12" r="3" {...p} /></svg>;
    case 'users':
      return <svg width={size} height={size} viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.5" {...p} /><path d="M3 20c0-3.5 2.7-6 6-6s6 2.5 6 6" {...p} /><circle cx="17" cy="9" r="2.5" {...p} /><path d="M15 15a5 5 0 016 5" {...p} /></svg>;
    case 'calendar':
      return <svg width={size} height={size} viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2" {...p} /><path d="M3 10h18M8 3v4M16 3v4" {...p} /></svg>;
    case 'arrow':
      return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7" {...p} /></svg>;
    case 'check':
      return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M4 12l5 5L20 6" {...p} /></svg>;
    case 'star':
      return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M12 2l3.1 6.3 7 1-5 4.9 1.2 6.9L12 17.8 5.7 21l1.2-6.9L2 9.3l7-1L12 2z" fill={color} stroke="none" /></svg>;
    case 'bell':
      return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M6 8a6 6 0 0112 0c0 7 3 8 3 8H3s3-1 3-8zM9 21a3 3 0 006 0" {...p} /></svg>;
    case 'lock':
      return <svg width={size} height={size} viewBox="0 0 24 24"><rect x="4" y="11" width="16" height="10" rx="2" {...p} /><path d="M8 11V8a4 4 0 018 0v3" {...p} /></svg>;
    case 'gps':
      return <svg width={size} height={size} viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" {...p} /><circle cx="12" cy="12" r="8" {...p} /><path d="M12 2v2M12 20v2M2 12h2M20 12h2" {...p} /></svg>;
    case 'route':
      return <svg width={size} height={size} viewBox="0 0 24 24"><circle cx="6" cy="6" r="2.5" {...p} /><circle cx="18" cy="18" r="2.5" {...p} /><path d="M8 6h7a3 3 0 010 6H9a3 3 0 000 6h7" {...p} /></svg>;
    case 'shield':
      return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M12 2l8 3v7c0 5-4 9-8 10-4-1-8-5-8-10V5l8-3z" {...p} /></svg>;
    case 'chevron':
      return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M9 6l6 6-6 6" {...p} /></svg>;
    case 'plus':
      return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" {...p} /></svg>;
    case 'sliders':
      return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M4 6h10M18 6h2M4 12h2M10 12h10M4 18h12M20 18h0" {...p} /><circle cx="16" cy="6" r="2" {...p} /><circle cx="8" cy="12" r="2" {...p} /><circle cx="18" cy="18" r="2" {...p} /></svg>;
    case 'walk':
      return <svg width={size} height={size} viewBox="0 0 24 24"><circle cx="13" cy="4" r="2" {...p} /><path d="M9 22l2-7-3-3 2-5 4 3 3 1M12 14l3 8" {...p} /></svg>;
    case 'flame':
      return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M12 3s4 4 4 8a4 4 0 11-8 0c0-1 1-2 1-2-2 1-4 3-4 6a7 7 0 0014 0c0-6-7-12-7-12z" {...p} /></svg>;
    case 'wifi':
      return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M5 12a10 10 0 0114 0M8.5 15.5a5 5 0 017 0" {...p} /><circle cx="12" cy="19" r="1" fill={color} stroke="none" /></svg>;
    case 'logout':
      return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M15 3h4a1 1 0 011 1v16a1 1 0 01-1 1h-4M10 17l5-5-5-5M15 12H3" {...p} /></svg>;
  }
  return null;
}

<script type="text/babel">

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {

          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,

      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}

        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,

          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',

}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';

    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

function PermisoCard({ icon, tone, title, desc, state, onAllow }) {

          }}>

          </button>
        )}
      </div>
    </Card>
  );
}

        <span style={{ fontFamily: fontBody, fontSize: 12, fontWeight: 700, color: C.text }}>

<script type="text/babel">
// screens-turno-hoy.jsx — Mi turno hoy + Firma + Done

const RADIO_GEOFENCE = 100; // meters, default per spec
const MAP_RANGE_M = 600; // meters covered by the map view (full width)

// State machine for "Hoy":
//   not-started → en-camino → en-zona → llegada-marcada (cronometro) → marcar-salida → firma → done

// ────────────────────────────────────────────────────────────
// Big stylized map of meeting point + user with geofence
// distance: meters from user to meeting point
function MiTurnoMap({ distance, arrived, dark }) {
  // Meeting point upper-right; user approaches from lower-left
  const MX = 250, MY = 78;
  const pxPerM = 360 / MAP_RANGE_M; // 0.6 px per meter
  const geofenceR = RADIO_GEOFENCE * pxPerM;
  // Direction from pin → user: south-west
  const dirX = -0.78; // west
  const dirY =  0.62; // south
  // Max display distance: limited by available room from pin to map edges along this vector
  const maxX_m = (MX - 8) / 0.78 / pxPerM;   // ~516 m
  const maxY_m = (260 - 14 - MY) / 0.62 / pxPerM; // ~452 m
  const maxDispM = Math.min(maxX_m, maxY_m);
  const dispM = Math.min(distance, maxDispM);
  const ux = MX + dirX * dispM * pxPerM;
  const uy = MY + dirY * dispM * pxPerM;
  const clamped = distance > maxDispM + 2;

  return (
    <div style={{ position: 'relative', height: 260, width: '100%', overflow: 'hidden', borderRadius: 24 }}>
      <svg width="100%" height="100%" viewBox="0 0 360 260" preserveAspectRatio="xMidYMid slice"
        style={{ display: 'block' }}>
        <defs>
          <radialGradient id="map-vignette" cx="50%" cy="50%" r="70%">
            <stop offset="60%" stopColor="rgba(0,0,0,0)" />
            <stop offset="100%" stopColor="rgba(0,0,0,0.18)" />
          </radialGradient>
          <pattern id="bgnoise" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
            <rect width="4" height="4" fill="#EEE5D6" />
            <circle cx="1" cy="1" r="0.4" fill="#E0D6C2" />
          </pattern>
        </defs>
        {/* base */}
        <rect width="360" height="260" fill="url(#bgnoise)" />
        {/* parks */}
        <path d="M-10 -10 L80 -10 L100 60 L40 90 L-10 70 Z" fill="#D8E6BD" opacity="0.85" />
        <rect x="280" y="180" width="100" height="100" rx="10" fill="#D8E6BD" opacity="0.85" />
        <circle cx="320" cy="50" r="36" fill="#D8E6BD" opacity="0.85" />
        {/* major roads */}
        <path d="M-20 200 L380 180" stroke="#FFF8EE" strokeWidth="22" />
        <path d="M-20 200 L380 180" stroke="#F0E4CC" strokeWidth="1.5" strokeDasharray="8 8" />
        <path d="M180 -20 L160 280" stroke="#FFF8EE" strokeWidth="16" />
        <path d="M-20 60 L380 80" stroke="#FFF8EE" strokeWidth="10" />
        <path d="M70 -20 L60 280" stroke="#FFF8EE" strokeWidth="8" />
        <path d="M280 -20 L290 280" stroke="#FFF8EE" strokeWidth="8" />
        {/* small streets */}
        <path d="M-20 140 L380 150" stroke="#FFFCF6" strokeWidth="4" />
        <path d="M120 -20 L115 280" stroke="#FFFCF6" strokeWidth="4" />
        <path d="M230 -20 L225 280" stroke="#FFFCF6" strokeWidth="4" />
        {/* blocks */}
        <rect x="80" y="90" width="38" height="44" rx="2" fill="#E5DAC0" />
        <rect x="125" y="90" width="32" height="44" rx="2" fill="#E5DAC0" />
        <rect x="195" y="90" width="32" height="44" rx="2" fill="#E5DAC0" />
        <rect x="235" y="90" width="42" height="44" rx="2" fill="#E5DAC0" />
        <rect x="80" y="160" width="38" height="14" rx="2" fill="#E5DAC0" />
        <rect x="125" y="160" width="32" height="14" rx="2" fill="#E5DAC0" />
        <rect x="195" y="220" width="28" height="34" rx="2" fill="#E5DAC0" />
        {/* highlighted building (venue) */}
        <rect x="232" y="58" width="42" height="32" rx="3" fill={C.primary} opacity="0.18" />
        <rect x="232" y="58" width="42" height="32" rx="3" fill="none" stroke={C.primary} strokeWidth="1.5" strokeDasharray="3 3" />

        {/* GEOFENCE */}
        <circle cx={MX} cy={MY} r={geofenceR} fill={C.success} opacity={arrived || distance < RADIO_GEOFENCE ? 0.18 : 0.08} />
        <circle cx={MX} cy={MY} r={geofenceR} fill="none" stroke={C.success}
          strokeWidth="2" strokeDasharray="6 4" opacity="0.85" />

        {/* route line */}
        {!arrived && distance > 5 && (
          <path
            d={`M${ux} ${uy} Q ${(ux + MX) / 2} ${(uy + MY) / 2 - 25} ${MX} ${MY}`}
            stroke={C.primary} strokeWidth="3" strokeDasharray="6 6" fill="none" opacity="0.85"
          />
        )}

        {/* MEETING PIN */}
        <g transform={`translate(${MX}, ${MY})`}>
          <ellipse cx="0" cy="8" rx="9" ry="3" fill="rgba(0,0,0,0.15)" />
          <path d="M0 -28 C-9 -28 -16 -21 -16 -12 C-16 -2 0 8 0 8 C0 8 16 -2 16 -12 C16 -21 9 -28 0 -28 Z"
            fill={C.primary} stroke="#fff" strokeWidth="2.5" />
          <circle cx="0" cy="-13" r="5" fill="#fff" />
        </g>

        {/* USER DOT (with pulse) */}
        {!arrived && (
          <g transform={`translate(${ux}, ${uy})`}>
            <circle cx="0" cy="0" r="16" fill="#3B82F6" opacity="0.18">
              <animate attributeName="r" from="9" to="20" dur="1.6s" repeatCount="indefinite" />
              <animate attributeName="opacity" from="0.35" to="0" dur="1.6s" repeatCount="indefinite" />
            </circle>
            <circle cx="0" cy="0" r="9" fill="#3B82F6" stroke="#fff" strokeWidth="3" />
            {clamped && (
              <g transform="rotate(52)">
                <path d="M0 -18 L5 -10 L-5 -10 Z" fill="#3B82F6" stroke="#fff" strokeWidth="1.5" />
              </g>
            )}
          </g>
        )}
        {arrived && (
          <g transform={`translate(${MX - 4}, ${MY + 14})`}>
            <circle cx="0" cy="0" r="11" fill="#3B82F6" stroke="#fff" strokeWidth="3" />
            <path d="M-4 0 L-1 3 L4 -3" stroke="#fff" strokeWidth="2.4" fill="none" strokeLinecap="round" strokeLinejoin="round" />
          </g>
        )}

        <rect width="360" height="260" fill="url(#map-vignette)" />
      </svg>
    </div>
  );
}

// ────────────────────────────────────────────────────────────
// Proximity indicator: big circular distance meter
function IndicadorProximidad({ distance, arrived }) {
  const inZone = distance <= RADIO_GEOFENCE;
  // Visual band: red >500, amber 100-500, green <100
  const band = inZone ? 'green' : distance < 500 ? 'amber' : 'red';
  const palette = {
    red:   { fg: C.danger,  bg: C.dangerTint,  text: 'Aún estás lejos', label: '+500 m del punto' },
    amber: { fg: C.warning, bg: C.warningTint, text: 'Casi llegas',     label: 'Acércate más' },
    green: { fg: C.success, bg: C.successTint, text: '¡Ya estás en el sitio!', label: 'Puedes marcar llegada' },
  };
  const p = palette[band];

  // Arc: progress to 0m. Full circle = 600m (visualization)
  const max = 600;
  const pct = Math.max(0, 1 - Math.min(distance, max) / max);
  const r = 56;
  const circ = 2 * Math.PI * r;

  return (
    <div style={{
      background: '#fff',
      borderRadius: 22,
      padding: 18,
      border: `1px solid ${C.border}`,
      display: 'flex',
      alignItems: 'center',
      gap: 16,
    }}>
      <div style={{ position: 'relative', width: 132, height: 132, flexShrink: 0 }}>
        <svg width="132" height="132" viewBox="0 0 132 132" style={{ transform: 'rotate(-90deg)' }}>
          <circle cx="66" cy="66" r={r} fill="none" stroke="#F0E9DF" strokeWidth="10" />
          <circle cx="66" cy="66" r={r} fill="none" stroke={p.fg} strokeWidth="10"
            strokeDasharray={`${pct * circ} ${circ}`} strokeLinecap={pct > 0.01 ? 'round' : 'butt'}
            style={{ transition: 'stroke-dasharray 0.4s ease, stroke 0.3s ease' }} />
        </svg>
        <div style={{
          position: 'absolute', inset: 0,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        }}>
          <div style={{
            fontFamily: fontDisplay, fontSize: 30, fontWeight: 800,
            color: p.fg, letterSpacing: -1, lineHeight: 1,
            fontVariantNumeric: 'tabular-nums',
          }}>{Math.round(distance)}</div>
          <div style={{
            fontFamily: fontBody, fontSize: 12, fontWeight: 700, color: C.muted,
            marginTop: 4, letterSpacing: 0.4, textTransform: 'uppercase',
          }}>metros</div>
        </div>
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          display: 'inline-flex', alignItems: 'center', gap: 6,
          background: p.bg, color: p.fg,
          padding: '5px 10px', borderRadius: 999,
          fontFamily: fontBody, fontSize: 11, fontWeight: 800, letterSpacing: 0.4, textTransform: 'uppercase',
          whiteSpace: 'nowrap',
        }}>
          <span style={{
            width: 7, height: 7, borderRadius: 4, background: p.fg,
            animation: !inZone ? 'pulse-dot 1.4s ease-in-out infinite' : 'none',
          }} />
          {p.label}
        </div>
        <div style={{
          fontFamily: fontDisplay, fontSize: 20, fontWeight: 700,
          color: C.text, letterSpacing: -0.4, lineHeight: 1.2, marginTop: 10,
        }}>{p.text}</div>
        <div style={{
          fontFamily: fontBody, fontSize: 13, color: C.muted, marginTop: 6, lineHeight: 1.4,
        }}>
          Zona de marcaje: <span style={{ color: C.text, fontWeight: 700 }}>{RADIO_GEOFENCE} m</span> alrededor del punto.
        </div>
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────
// MI TURNO HOY

function fmtElapsed(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function arrivalTime(elapsedSec) {
  // Assume current time minus elapsed; fake to 08:05
  const base = 8 * 60 + 5; // 08:05
  return `${Math.floor(base/60)}:${String(base%60).padStart(2,'0')}`;
}

function FirmaScreen({ onBack, onConfirm, turno = MI_PROXIMO_TURNO }) {
  const canvasRef = React.useRef(null);
  const [hasSigned, setHasSigned] = React.useState(false);
  const drawing = React.useRef(false);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    // Set internal size for crispness
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    ctx.scale(2, 2);
    ctx.strokeStyle = C.ink;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }, []);

  const pos = (e) => {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  };

  const start = (e) => {
    e.preventDefault();
    drawing.current = true;
    const p = pos(e);
    const ctx = canvasRef.current.getContext('2d');
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    setHasSigned(true);
  };
  const move = (e) => {
    if (!drawing.current) return;
    e.preventDefault();
    const p = pos(e);
    const ctx = canvasRef.current.getContext('2d');
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  };
  const end = () => { drawing.current = false; };
  const clear = () => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    setHasSigned(false);
  };

  return (
    <div style={{ paddingBottom: 130, background: C.bg, minHeight: '100%' }}>

        <ScreenHeader onBack={onBack} title="Firma del contrato" />

          Es tu contrato diario. Una vez firmado, se libera tu pago.

      </div>

      {/* Contrato summary */}

        <Card padding={16} radius={20}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>

                Contrato # AT-2025-{turno.id.toString().padStart(4,'0')}
              </div>
              <div style={{ fontFamily: fontDisplay, fontSize: 17, fontWeight: 700, color: C.text, marginTop: 2 }}>
                {turno.titulo}
              </div>
            </div>
            <Badge tone="success" size="md" icon={<Icon name="check" size={12} color="#0A7A52" strokeWidth={2.6} />}>
              Listo
            </Badge>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            <ContratoStat label="Horas trabajadas" value="9h 02m" />
            <ContratoStat label="Pago del día" value={fmtCOP(turno.tarifa)} accent />
            <ContratoStat label="Empresa" value={turno.empresa} />
            <ContratoStat label="Fecha" value="15 nov 2024" />
          </div>
        </Card>
      </div>

      {/* Signature area */}
      <div style={{ padding: '20px 20px 0' }}>
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8,
        }}>
          <div style={{ fontFamily: fontDisplay, fontSize: 16, fontWeight: 700, color: C.text }}>
            Firma con tu dedo
          </div>
          {hasSigned && (
            <button onClick={clear} style={{
              background: 'none', border: 'none', cursor: 'pointer',
              color: C.muted, fontFamily: fontBody, fontSize: 13, fontWeight: 700,
              textDecoration: 'underline',
            }}>Borrar</button>
          )}
        </div>
        <div style={{
          position: 'relative', background: '#fff', borderRadius: 20,
          border: `1.5px dashed ${hasSigned ? C.primary : C.mutedLight}`,
          height: 200, overflow: 'hidden', transition: 'border-color 0.2s',
        }}>
          <canvas ref={canvasRef}
            style={{ width: '100%', height: '100%', display: 'block', touchAction: 'none', cursor: 'crosshair' }}
            onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
            onTouchStart={start} onTouchMove={move} onTouchEnd={end}
          />
          {!hasSigned && (
            <div style={{
              position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center', pointerEvents: 'none',
              color: C.mutedLight,

              </svg>
              <div style={{ fontFamily: fontBody, fontSize: 14, fontWeight: 600, marginTop: 8 }}>
                Desliza para firmar
              </div>
            </div>
          )}
          <div style={{
            position: 'absolute', bottom: 12, left: 12, right: 12,
            display: 'flex', alignItems: 'center', gap: 8,
            color: C.mutedLight, pointerEvents: 'none',
          }}>
            <div style={{ flex: 1, height: 1, background: C.border }} />

    </div>
  );
}

            </div>
            <div style={{ fontFamily: fontBody, fontSize: 12, color: C.textDim, marginTop: 2, fontWeight: 600 }}>
              Entrada 07:02 · acumulando…
            </div>
          </>
        ) : isPermiso ? (
          <>
            <div style={{ fontFamily: fontBody, fontSize: 14, fontWeight: 700, color: C.text }}>
              Permiso médico
            </div>
            <div style={{ fontFamily: fontBody, fontSize: 12, color: C.muted, marginTop: 2 }}>
              Aprobado por J. Ramírez
            </div>
          </>
        ) : d.entrada === '—' ? (
          <div style={{ fontFamily: fontBody, fontSize: 13, color: C.muted, fontWeight: 600 }}>
            Sin registro
          </div>
        ) : (
          <>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontFamily: fontBody, fontSize: 14, fontWeight: 700, color: C.text, fontVariantNumeric: 'tabular-nums' }}>
                {d.entrada} → {d.salida}
              </span>
              {isExtra && <Badge tone="success" size="sm">+0.5h extra</Badge>}
            </div>
            <div style={{ fontFamily: fontBody, fontSize: 12, color: C.muted, marginTop: 2, fontVariantNumeric: 'tabular-nums' }}>
              {d.horas}h trabajadas
            </div>
          </>
        )}
      </div>
      {!d.future && d.entrada !== '—' && (
        <div style={{
          fontFamily: fontDisplay, fontSize: 16, fontWeight: 800,
          color: today ? CN.primaryDeep : C.text, letterSpacing: -0.2,
          fontVariantNumeric: 'tabular-nums',
        }}>
          {d.horas > 0 ? `${d.horas}h` : ''}
        </div>
      )}
    </div>
  );
}

Object.assign(window, {
  MiTurnoHoyScreen, FirmaScreen, TurnoDoneScreen, NominaScreen,
  IndicadorProximidad, MiTurnoMap, RADIO_GEOFENCE,
});

</script>

<!-- ═══════════════════════════════════════════════════════
     7. App root + state machine
     ═══════════════════════════════════════════════════════ -->
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ──────────────────────────────────────────────────────────────
// Tweak defaults
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "distancia": 1200,
  "estadoTurno": "en-camino"
}/*EDITMODE-END*/;

// ──────────────────────────────────────────────────────────────
// Auto-fit the phone into any viewport
function useFit(designW, designH) {
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const fit = () => {
      const margin = 32;
      const sw = window.innerWidth - margin;
      const sh = window.innerHeight - margin;
      setScale(Math.min(1, sw / designW, sh / designH));
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, [designW, designH]);
  return scale;
}

// ──────────────────────────────────────────────────────────────
// Main App
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Auth state machine: login → activar → permisos → app
  const [authStep, setAuthStep] = useState('login'); // 'login' | 'activar' | 'permisos' | 'in'
  // Tab inside app
  const [tab, setTab] = useState('home');
  // Stack screen above tab content
  const [stack, setStack] = useState([]); // {screen, props}
  // Selected oferta + postulación state
  const [selectedOfertaId, setSelectedOfertaId] = useState(null);
  const [postuladaIds, setPostuladaIds] = useState(new Set());
  const [showPostuladoModal, setShowPostuladoModal] = useState(false);

  // Mi turno state machine (driven by tweaks AND user actions)
  // 'en-camino' (default) → user marks arrival → 'en-curso' → user marks salida → 'firma' → 'done'
  // The tweak "estadoTurno" can jump to any state directly.
  const [turnoState, setTurnoState] = useState(t.estadoTurno);
  // Cronómetro from arrival
  const [elapsed, setElapsed] = useState(8 * 3600 + 35 * 60 + 12); // 8h 35m

  // Sync tweak → turno state
  useEffect(() => {
    setTurnoState(t.estadoTurno);
  }, [t.estadoTurno]);

  // Tick the cronómetro when en-curso
  useEffect(() => {
    if (turnoState !== 'en-curso') return;
    const id = setInterval(() => setElapsed((e) => e + 1), 1000);
    return () => clearInterval(id);
  }, [turnoState]);

  // ── Auth handlers
  const goActivar = () => setAuthStep('activar');
  const goPermisos = () => setAuthStep('permisos');
  const goIntoApp = () => { setAuthStep('in'); setTab('home'); };
  const logout = () => { setAuthStep('login'); setStack([]); };

  // ── Stack helpers
  const push = (screen, props = {}) => setStack((s) => [...s, { screen, props }]);
  const pop = () => setStack((s) => s.slice(0, -1));
  const reset = () => setStack([]);

  // ── Oferta handlers
  const openOferta = (id) => {
    setSelectedOfertaId(id);
    push('oferta-detalle');
  };
  const postular = () => {
    setPostuladaIds((p) => new Set([...p, selectedOfertaId]));
    setShowPostuladoModal(true);
  };
  const closePostuladoModal = () => {
    setShowPostuladoModal(false);
    pop();
  };

  // ── Mi turno handlers (only meaningful when on "hoy" tab or via push)
  const onArrive = () => { setTurnoState('en-curso'); setElapsed(0); setTweak('estadoTurno', 'en-curso'); };
  const onLeave = () => { setTurnoState('firma'); setTweak('estadoTurno', 'firma'); };
  const onConfirmFirma = () => { setTurnoState('done'); setTweak('estadoTurno', 'done'); };
  const onTurnoHome = () => {
    setTurnoState('en-camino'); setTweak('estadoTurno', 'en-camino');
    setElapsed(8 * 3600 + 35 * 60 + 12);
    setTab('home');
  };

  // ── Selected oferta
  const oferta = MOCK_OFERTAS.find((o) => o.id === selectedOfertaId) || MOCK_OFERTAS[0];

  // ──────────────────────────────────────────────────────────
  // Screen renderer
  let content;
  if (authStep === 'login') {
    content = <LoginScreen onLogin={goIntoApp} onActivar={goActivar} />;
  } else if (authStep === 'activar') {
    content = <ActivarScreen onBack={() => setAuthStep('login')} onNext={goPermisos} />;
  } else if (authStep === 'permisos') {
    content = <PermisosScreen onContinue={goIntoApp} />;
  } else {
    // In-app
    const top = stack[stack.length - 1];

    let inner;
    if (top?.screen === 'oferta-detalle') {
      inner = (
        <OfertaDetalleScreen
          oferta={oferta}
          onBack={pop}
          onPostular={postular}
          postulado={postuladaIds.has(oferta.id)}
        />
      );
    } else if (tab === 'home') {
      inner = (
        <HomeScreen
          onOpenOferta={(id) => {
            if (id) openOferta(id);
            else setTab('ofertas');
          }}
          onOpenHoy={() => setTab('hoy')}
        />
      );
    } else if (tab === 'ofertas') {
      inner = <OfertasScreen onOpenOferta={openOferta} />;
    } else if (tab === 'hoy') {
      if (turnoState === 'en-camino') {
        inner = (
          <MiTurnoHoyScreen
            distance={t.distancia}
            arrived={false}
            elapsedSec={elapsed}
            onArrive={onArrive}
            onBack={() => setTab('home')}
          />
        );
      } else if (turnoState === 'en-curso') {
        inner = (
          <MiTurnoHoyScreen
            distance={Math.min(t.distancia, RADIO_GEOFENCE - 5)}
            arrived={true}
            elapsedSec={elapsed}
            onLeave={onLeave}
            onBack={() => setTab('home')}
          />
        );
      } else if (turnoState === 'firma') {
        inner = (
          <FirmaScreen
            onBack={() => setTurnoState('en-curso')}
            onConfirm={onConfirmFirma}
          />
        );
      } else if (turnoState === 'done') {
        inner = <TurnoDoneScreen onHome={onTurnoHome} />;
      }
    } else if (tab === 'nomina') {
      inner = <NominaScreen />;
    }

    // Wrap with tab bar (hide on full-bleed states like firma/done)
    const hideTabBar = top?.screen === 'oferta-detalle'
      || (tab === 'hoy' && (turnoState === 'firma' || turnoState === 'done'));

    content = (
      <div style={{ position: 'relative', height: '100%' }}>
        <div key={`${tab}-${turnoState}-${top?.screen || ''}`}
          style={{
            height: '100%', overflowY: 'auto', overflowX: 'hidden',
            animation: 'screen-in-up 0.32s cubic-bezier(0.2, 0.8, 0.3, 1)',
          }}>
          {inner}
        </div>
        {!hideTabBar && <TabBar current={tab} onChange={(id) => { reset(); setTab(id); }} />}
        {showPostuladoModal && (
          <PostuladoModal oferta={oferta} onClose={closePostuladoModal} />
        )}
      </div>
    );
  }

  // ──────────────────────────────────────────────────────────
  // Layout: iPhone frame + tweaks panel
  const designW = 402, designH = 874;
  const scale = useFit(designW + 32, designH + 64);

  return (
    <div style={{
      transform: `scale(${scale})`,
      transformOrigin: 'center center',
    }}>
      <IOSDevice width={designW} height={designH}>
        <div style={{ position: 'relative', height: '100%', background: C.bg }}>
          {content}
        </div>
      </IOSDevice>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Distancia al punto de encuentro"
          hint="Mueve el dot del usuario en el mapa de Mi turno y cambia el color del indicador." />
        <TweakSlider
          label="Distancia"
          value={t.distancia}
          min={0} max={1500} step={5} unit=" m"
          onChange={(v) => setTweak('distancia', v)}
        />
        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 4,
          padding: '2px 8px 6px',
        }}>
          <SnapButton label="En zona" sub="20 m" onClick={() => setTweak('distancia', 20)} active={t.distancia <= RADIO_GEOFENCE} />
          <SnapButton label="Cerca" sub="280 m" onClick={() => setTweak('distancia', 280)} active={t.distancia > RADIO_GEOFENCE && t.distancia < 500} />
          <SnapButton label="Lejos" sub="1.2 km" onClick={() => setTweak('distancia', 1200)} active={t.distancia >= 500} />
        </div>

        <TweakSection label="Flujo del turno" />
        <TweakRadio
          label="Estado del turno"
          value={t.estadoTurno}
          options={['en-camino', 'en-curso', 'firma', 'done']}
          onChange={(v) => setTweak('estadoTurno', v)}
        />
      </TweaksPanel>
    </div>
  );
}

// Small custom snap-distance button
function SnapButton({ label, sub, onClick, active }) {
  return (
    <button onClick={onClick} style={{
      padding: '6px 4px',
      border: `1px solid ${active ? '#29261b' : 'rgba(0,0,0,0.1)'}`,
      borderRadius: 8,
      background: active ? '#29261b' : 'rgba(255,255,255,0.6)',
      color: active ? '#fff' : '#29261b',
      cursor: 'pointer',
      fontFamily: 'inherit',
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 1,
      lineHeight: 1.2, whiteSpace: 'nowrap',
    }}>
      <span style={{ fontSize: 10.5, fontWeight: 700 }}>{label}</span>
      <span style={{ fontSize: 9, opacity: 0.7 }}>{sub}</span>
    </button>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
