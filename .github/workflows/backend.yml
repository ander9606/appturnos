name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  # ── Checks (corre en PR y en push a main) ─────────────────────
  ci:
    name: Tests & Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Tests
        run: npm test

      - name: Auditoría de seguridad
        # Falla si hay vulnerabilidades altas o críticas
        run: npm audit --audit-level=high

  # ── Deploy (solo en push a main, solo si CI pasó) ─────────────
  deploy:
    name: Deploy al VPS
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy vía SSH
        env:
          SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

          ssh root@"$HOST" << 'ENDSSH'
            set -e
            cd /app
            echo "→ Actualizando código..."
            git pull origin main
            echo "→ Asegurando cron de backup diario..."
            (crontab -l 2>/dev/null | grep -qF 'backup-db.sh') || \
              ( (crontab -l 2>/dev/null; echo '0 8 * * * /app/backend/scripts/backup-db.sh >> /var/log/mysql-backup.log 2>&1') | crontab - )
            echo "→ Reconstruyendo API..."
            docker compose --env-file backend/.env build api
            echo "→ Reiniciando API..."
            docker compose --env-file backend/.env stop api
            docker compose --env-file backend/.env rm -f api
            docker compose --env-file backend/.env up -d api
            echo "→ Verificando health (migraciones + servidor)..."
            for i in $(seq 1 30); do
              if docker compose --env-file backend/.env exec -T api wget -qO- http://localhost:3001/api/health > /dev/null 2>&1; then
                echo "→ Logs de migraciones:"
                docker compose --env-file backend/.env logs api --tail 30 2>&1 | grep -iE "migra|aplica|pendiente|error|warn" || true
                echo "→ Reseed tenant de pruebas..."
                docker compose --env-file backend/.env exec -T api node seeds/seed-plataforma-turnos.js
                echo "✅ Deploy completado"
                exit 0
              fi
              sleep 2
            done
            echo "❌ Health check falló después de 60s — últimos logs:"
            docker compose --env-file backend/.env logs api --tail 40
            exit 1
          ENDSSH
