name: Mobile CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/api-client/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/api-client/**'

jobs:
  # ── Type check (corre en PR y en push a main) ──────────────────
  ci:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Type check
        run: npm run type-check

  # ── OTA Update (solo en push a main) ──────────────────────────
  # Actualiza el bundle JS en producción sin pasar por las tiendas.
  # Solo aplica a cambios de código JS/TS — no a cambios nativos.
  ota-update:
    name: OTA Update → producción
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: OTA Update — rama production
        run: |
          eas update \
            --branch production \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}

# ──────────────────────────────────────────────────────────────────
# NOTA: Build nativo (cuando cambias dependencias o app.json)
# No corre automáticamente — lanzar manualmente:
#
#   eas build --platform android --profile production
#   eas build --platform ios     --profile production
#   eas submit --platform android
#   eas submit --platform ios
#
# O agregar un workflow separado disparado por tags:
#   on:
#     push:
#       tags: ['v*']
# ──────────────────────────────────────────────────────────────────
