name: Mobile CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/api-client/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/api-client/**'
  workflow_dispatch:
    inputs:
      group_id:
        description: 'Update group ID a promover a producción (lo imprime el job de OTA → staging)'
        required: true

jobs:
  # ── Type check (corre en PR y en push a main) ──────────────────
  ci:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Type check
        run: npm run type-check

  # ── OTA Update (solo en push a main) ──────────────────────────
  # Publica el bundle JS al canal de staging — no llega a usuarios reales
  # todavía. Solo aplica a cambios de código JS/TS, no a cambios nativos.
  ota-update:
    name: OTA Update → staging
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: OTA Update — rama staging
        run: |
          eas update \
            --branch staging \
            --message "$COMMIT_MESSAGE" \
            --non-interactive
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}

  # ── Promover a producción (manual) ────────────────────────────
  # Dispara desde GitHub Actions → "Run workflow", pasando el group_id que
  # imprime el paso "OTA Update — rama staging" de arriba. Republica el
  # MISMO bundle ya probado en staging — no recompila desde el código actual.
  ota-promote-production:
    name: Promover staging → producción
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: Republicar grupo probado en staging → producción
        run: |
          eas update:republish \
            --group "$GROUP_ID" \
            --destination-channel production \
            --message "Promovido desde staging: $GROUP_ID" \
            --non-interactive
        env:
          GROUP_ID: ${{ github.event.inputs.group_id }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

# ──────────────────────────────────────────────────────────────────
# NOTA: Build nativo (cuando cambias dependencias o app.json)
# No corre automáticamente — lanzar manualmente:
#
#   eas build --platform android --profile production
#   eas build --platform ios     --profile production
#   eas submit --platform android
#   eas submit --platform ios
#
# O agregar un workflow separado disparado por tags:
#   on:
#     push:
#       tags: ['v*']
# ──────────────────────────────────────────────────────────────────
